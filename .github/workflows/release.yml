name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.2.0)'
        required: true
      notes:
        description: "What's new — bullet points shown in the in-app update dialog and on the releases page. Required."
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: Build — Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          retention-days: 90
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  build-windows:
    name: Build — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          retention-days: 90
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  build-macos:
    name: Build — macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npm run tauri build

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          retention-days: 90
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/linux

      - name: Download Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: artifacts/windows

      - name: Download macOS bundles
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles
          path: artifacts/macos

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug Artifacts
        run: |
          echo "--- LINUX ARTIFACTS ---"
          find artifacts/linux -maxdepth 3 -ls
          echo "--- WINDOWS ARTIFACTS ---"
          find artifacts/windows -maxdepth 3 -ls
          echo "--- MACOS ARTIFACTS ---"
          find artifacts/macos -maxdepth 3 -ls

      - name: Build latest.json
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Discover update bundles
          # Linux:   *.AppImage + *.AppImage.sig
          # Windows: *.exe      + *.exe.sig  (NSIS installer)
          # macOS:   *.app.tar.gz + *.app.tar.gz.sig
          LINUX_BUNDLE=$(find artifacts/linux -name "*.AppImage" | head -1)
          WINDOWS_BUNDLE=$(find artifacts/windows -name "*.exe" | head -1)
          MACOS_BUNDLE=$(find artifacts/macos -name "*.app.tar.gz" | head -1)

          # Discover signatures
          LINUX_SIG_FILE=$(find artifacts/linux -name "*.AppImage.sig" | head -1)
          WINDOWS_SIG_FILE=$(find artifacts/windows -name "*.exe.sig" | head -1)
          MACOS_SIG_FILE=$(find artifacts/macos -name "*.app.tar.gz.sig" | head -1)

          # Validation — fail build if any bundle or signature is missing
          if [ -z "$LINUX_SIG_FILE" ];   then echo "ERROR: Linux signature (.AppImage.sig) not found";      exit 1; fi
          if [ -z "$WINDOWS_SIG_FILE" ]; then echo "ERROR: Windows signature (.exe.sig) not found";         exit 1; fi
          if [ -z "$MACOS_SIG_FILE" ];   then echo "ERROR: macOS signature (.app.tar.gz.sig) not found";    exit 1; fi
          if [ -z "$LINUX_BUNDLE" ];     then echo "ERROR: Linux update bundle (.AppImage) not found";      exit 1; fi
          if [ -z "$WINDOWS_BUNDLE" ];   then echo "ERROR: Windows update bundle (.exe) not found";         exit 1; fi
          if [ -z "$MACOS_BUNDLE" ];     then echo "ERROR: macOS update bundle (.app.tar.gz) not found";    exit 1; fi

          # Read signature contents
          LINUX_SIG=$(cat "$LINUX_SIG_FILE")
          WINDOWS_SIG=$(cat "$WINDOWS_SIG_FILE")
          MACOS_SIG=$(cat "$MACOS_SIG_FILE")

          REPO_URL="https://github.com/prasoon-pradeep/Simple-SOP/releases/download/${TAG}"

          NOTES="${{ github.event.inputs.notes }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Use jq --arg so all values are JSON-escaped automatically.
          # This prevents broken latest.json when notes contain newlines, quotes, etc.
          jq -n \
            --arg version    "$VERSION" \
            --arg notes      "$NOTES" \
            --arg pub_date   "$PUB_DATE" \
            --arg linux_sig  "$LINUX_SIG" \
            --arg linux_url  "${REPO_URL}/$(basename "$LINUX_BUNDLE")" \
            --arg win_sig    "$WINDOWS_SIG" \
            --arg win_url    "${REPO_URL}/$(basename "$WINDOWS_BUNDLE")" \
            --arg mac_sig    "$MACOS_SIG" \
            --arg mac_url    "${REPO_URL}/$(basename "$MACOS_BUNDLE")" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64":   { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig,   url: $win_url   },
                "darwin-aarch64": { signature: $mac_sig,   url: $mac_url   }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: SOP Builder ${{ github.event.inputs.tag }}
          body: |
            ## What's new in ${{ github.event.inputs.tag }}

            ${{ github.event.inputs.notes }}

            ### Installation
            - **Windows**: Download and run the `.exe` (NSIS installer) or `.msi`
            - **Linux**: Download the `.AppImage` (portable) or `.deb` (Debian/Ubuntu)
            - **macOS (Apple Silicon)**: Download the `.dmg`, open it, drag SOP Builder to Applications. If you see **"damaged and can't be opened"**, open Terminal and run: `xattr -cr /Applications/sop-builder.app` — then launch normally.

            The app will automatically check for future updates on launch.
          files: |
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.AppImage.sig
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.msi.sig
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.exe.sig
            artifacts/macos/**/*.dmg
            artifacts/macos/**/*.app.tar.gz
            artifacts/macos/**/*.app.tar.gz.sig
            latest.json
          draft: false
          prerelease: false
          make_latest: true
