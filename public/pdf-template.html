<!DOCTYPE html>
<!--
  ============================================================
  SOP BUILDER — PDF OUTPUT TEMPLATE
  ============================================================
  PURPOSE:
    Rendered inside a Tauri hidden webview and printed to PDF
    via Tauri's print-to-PDF command. NOT an app screen.

  DATA INJECTION:
    Rust injects `window.SOP_DATA = { ... }` before this page
    renders. The mock data block below is used for browser
    preview only and is overridden at render time.

  COLOUR RULE:
    Entire document is greyscale EXCEPT the company name in the
    title block, which uses the brand colour from settings.
    Do NOT add brand colour anywhere else in the document.

  PAPER:   A4 Portrait (210mm × 297mm)
  FONTS:   Arial / Helvetica — universally available, offline-safe
  SPEC:    SOP_BUILDER_SPEC.md — Section 15 (PDF Export)
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Standard Operating Procedure</title>

  <style>
    /* ============================================================
       CSS VARIABLES
       --brand is used ONLY for the company name text.
       All other document elements are greyscale.
       Values are overridden at runtime by the JS style injector.
       ============================================================ */
    :root {
      --brand:        #333333;   /* overridden by JS with actual brand colour */
      --border:       #c0c0c0;
      --border-light: #d8d8d8;
      --row-alt:      #f6f6f6;
      --text:         #1a1a1a;
      --text-muted:   #555555;
      --text-faint:   #888888;
      --header-bg:    #2d2d2d;   /* dark grey for all section header bars */
    }

    /* ============================================================
       PAGE SETUP — A4 portrait
       Top 22mm accommodates running header on pages 2+.
       ============================================================ */
    @page {
      size: A4 portrait;
      margin: 15mm 15mm 15mm 15mm;
    }

    @page :first {
      margin-top: 10mm;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: auto; }

    body {
      font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
      font-size: 8.5pt;
      line-height: 1.45;
      color: var(--text);
      background: #ffffff;
    }

    /* ============================================================
       SCREEN PREVIEW — centred A4 shadow card in browser
       ============================================================ */
    @media screen {
      body {
        background: #c8c8c8;
        padding: 24px;
      }
      #sop-root {
        background: #ffffff;
        width: 210mm;
        min-height: 297mm;
        margin: 0 auto;
        padding: 15mm 15mm 15mm;
        box-shadow: 0 4px 28px rgba(0,0,0,0.28);
      }
    }

    @media print {
      #sop-root { padding: 0; }
      a { color: inherit; text-decoration: none; }
    }

    /* ============================================================
       DOCUMENT TITLE BLOCK
       Engineering drawing title-block style (ref. ISO 7200).
       Structure:
         1. Dark top bar — company name in brand colour, doc type white
         2. Full-width document title row
         3. Two-column doc-control metadata grid
         4. Distribution row
       ============================================================ */
    .title-block {
      border: 1.5px solid #333333;
      margin-bottom: 12pt;
      page-break-inside: avoid;
    }

    /* — Top bar: dark grey background — */
    .title-block__top {
      display: flex;
      align-items: stretch;
      min-height: 38px;
      background: var(--header-bg);
    }

    .title-block__company {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 12px;
      border-right: 1px solid rgba(255,255,255,0.15);
    }


    /*
      BRAND COLOUR — ONLY USAGE IN THE ENTIRE DOCUMENT.
      Company name text uses var(--brand).
      Nothing else does.
    */
    .title-block__company-name {
      font-size: 11pt;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.1px;
      line-height: 1.2;
    }

    .title-block__doc-type {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      padding: 7px 12px;
      text-align: right;
      background: rgba(0,0,0,0.18);
    }

    .title-block__doc-type-label {
      font-size: 6.5pt;
      font-weight: bold;
      color: rgba(255,255,255,0.55);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 2px;
    }

    .title-block__doc-type-value {
      font-size: 9pt;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      line-height: 1;
    }

    /* — Full-width title row — */
    .title-block__title-row {
      padding: 6px 12px 5px;
      border-top: 1.5px solid #333333;
      border-bottom: 1px solid var(--border);
      background: #f2f2f2;
    }

    .title-block__title-label {
      font-size: 6.5pt;
      font-weight: bold;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .title-block__title-text {
      font-size: 11pt;
      font-weight: bold;
      color: #111111;
      letter-spacing: -0.1px;
      line-height: 1.3;
    }

    /* — Two-column doc-control metadata — */
    .title-block__meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
    }

    .title-block__meta-col {
      padding: 6px 12px 7px;
    }

    .title-block__meta-col:first-child {
      border-right: 1px solid var(--border);
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 2.5px;
    }

    .meta-row:last-child { margin-bottom: 0; }

    .meta-label {
      font-weight: bold;
      color: var(--text-muted);
      min-width: 92px;
      flex-shrink: 0;
      font-size: 7.5pt;
    }

    .meta-value {
      color: var(--text);
      font-size: 8pt;
      line-height: 1.3;
    }

    .meta-mono {
      font-family: 'Courier New', Courier, monospace;
      font-size: 7.5pt;
      letter-spacing: 0.5px;
    }

    /* — Distribution row — */
    .title-block__dist {
      border-top: 1px solid var(--border);
      padding: 4px 12px 5px;
      background: #f8f8f8;
      font-size: 7.5pt;
      display: flex;
      gap: 6px;
    }

    .title-block__dist-label {
      font-weight: bold;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ============================================================
       STATUS — greyscale text-weight approach, no colour dots
       Approval status is conveyed through font weight and style.
       ============================================================ */
    .status--approved  { font-weight: bold;   font-style: normal;  color: #1a1a1a; }
    .status--review    { font-weight: normal;  font-style: italic;  color: #333333; }
    .status--draft     { font-weight: normal;  font-style: italic;  color: #666666; }
    .status--rejected  { font-weight: bold;    font-style: italic;  color: #1a1a1a; }

    /* ============================================================
       SECTION WRAPPER + HEADER BAR
       Dark grey header bar — consistent throughout document.
       ============================================================ */
    .section {
      margin-bottom: 11pt;
    }

    .section__header {
      background: var(--header-bg);
      color: #ffffff;
      padding: 3.5px 8px;
      font-size: 7.5pt;
      font-weight: bold;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      page-break-after: avoid;
    }

    /* ============================================================
       GENERAL TABLE — base styles
       ============================================================ */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 8pt;
    }

    th {
      text-align: left;
      font-size: 7pt;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      color: #333333;
      background: #ebebeb;
      padding: 4px 7px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 4.5px 7px;
      border: 1px solid var(--border);
      vertical-align: top;
      color: var(--text);
      line-height: 1.4;
    }

    tbody tr:nth-child(even) td {
      background: var(--row-alt);
    }

    tbody tr { page-break-inside: avoid; }

    /* ============================================================
       PURPOSE & SCOPE — label | content layout
       ============================================================ */
    .ps-table td { padding: 6px 8px; font-size: 8.5pt; }

    .ps-table__label {
      width: 72px;
      font-weight: bold;
      color: var(--text-muted);
      font-size: 7.5pt;
      background: #f0f0f0;
      border-right: 1px solid var(--border) !important;
      vertical-align: top;
      white-space: nowrap;
    }

    .ps-table__content {
      white-space: pre-wrap;
      font-size: 8.5pt;
      line-height: 1.55;
    }

    /* ============================================================
       SAFETY BOX — left-border callout block, greyscale
       No icon. Plain bold uppercase header per industrial doc style.
       ============================================================ */
    .safety-box {
      border: 1px solid #aaaaaa;
      border-left: 4px solid #555555;
      background: #f5f5f5;
      padding: 7px 10px;
      margin-bottom: 7px;
      page-break-inside: avoid;
    }

    .safety-box__header {
      font-size: 7.5pt;
      font-weight: bold;
      color: #222222;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .safety-box__content {
      font-size: 8.5pt;
      line-height: 1.55;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    /* Training notice — same greyscale treatment with slightly lighter border */
    .training-box {
      border: 1px solid #bbbbbb;
      border-left: 4px solid #444444;
      background: #f8f8f8;
      padding: 6px 10px;
      margin-top: 6px;
      page-break-inside: avoid;
    }

    .training-box__header {
      font-size: 7pt;
      font-weight: bold;
      color: #222222;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .training-box__content {
      font-size: 8.5pt;
      line-height: 1.5;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    .safety-wrap { padding: 7px 0 1px; }

    /* ============================================================
       IMAGE THUMBNAILS — used in tools, items, and steps tables
       max-width: 100% lets the image scale down to fit its column.
       ============================================================ */
    .table-img {
      height: 60px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: block;
      margin: 0 auto;
    }

    .table-img-placeholder {
      width: 80px;
      height: 60px;
      background: #ececec;
      border: 1px dashed #c0c0c0;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .table-img-placeholder svg {
      color: #bbbbbb;
    }

    /* Compact image column in data tables */
    .col-img {
      text-align: center;
      vertical-align: middle;
      padding: 3px 4px !important;
    }

    /* ============================================================
       TOOLS TABLE
       table-layout: fixed — columns never exceed their declared width.
       overflow-wrap: break-word — only breaks a word when it truly
         cannot fit; does NOT split "Physical" or "TW-200-NM".
       word-break is intentionally NOT set — the browser will break
         only at natural opportunities (spaces, hyphens).
       Column widths sum to 100% explicitly.
       ============================================================ */
    .tools-table {
      table-layout: fixed;
      font-size: 7.5pt;
    }

    /* Smaller header text so labels fit without wrapping */
    .tools-table th {
      font-size: 6.5pt;
      white-space: normal;
      line-height: 1.3;
    }

    .tools-table td {
      overflow-wrap: break-word;
      font-size: 7.5pt;
    }

    /*
      Column widths — must add to 100%.
      #3 + img10 + name16 + type10 + model13 + spec(31) + cal8 + due9 = 100%
    */
    .tools-table .col-num   { width: 3%;  text-align: center; }
    .tools-table .col-img   { width: 20%; text-align: center; padding: 3px 4px !important; vertical-align: middle; }
    .tools-table .col-name  { width: 16%; }
    .tools-table .col-type  { width: 10%; text-align: center; }
    .tools-table .col-model { width: 13%; }
    .tools-table .col-spec  { width: 21%; }
    .tools-table .col-cal   { width: 8%;  text-align: center; }
    .tools-table .col-due   { width: 9%;  text-align: center; }

    .tools-table td.col-num  { color: var(--text-faint); text-align: center; }
    .tools-table td.col-type { text-align: center; }
    .tools-table td.col-cal  { text-align: center; }
    .tools-table td.col-due  { text-align: center; }
    .tools-table .name-cell  { font-weight: 600; }

    /* ============================================================
       ITEMS TABLE
       Columns: # | Image | Name | Part No. | Description | Unit
       ============================================================ */
    .items-table .col-num  { width: 26px;  text-align: center; }
    .items-table .col-img  { width: 110px; text-align: center; padding: 3px 4px !important; vertical-align: middle; }
    .items-table .col-part { width: 98px; }
    .items-table .col-unit { width: 42px;  text-align: center; }

    .items-table td.col-num  { color: var(--text-faint); font-size: 7.5pt; text-align: center; }
    .items-table td.col-unit { text-align: center; font-weight: 600; }
    .items-table .name-cell  { font-weight: 600; }

    /* ============================================================
       STEPS TABLE
       Columns: Step | Action (+ tool/item tags) | Expected Output | Notes
       Image sub-rows span action + output + notes columns.
       ============================================================ */
    /*
      Steps table — 5 columns:
      Step | Action | Expected Output | Notes | Tools & Materials
      Widths are percentage-based; Step is fixed 30px.
    */
    .steps-table .col-step       { width: 30px; text-align: center; }
    .steps-table .col-output     { width: 17%; }
    .steps-table .col-notes      { width: 15%; }
    .steps-table .col-tools-mats { width: 20%; }

    /* Step number cell — dark grey left-border accent, greyscale */
    .steps-table td.col-step {
      text-align: center;
      vertical-align: top;
      font-size: 9.5pt;
      font-weight: bold;
      color: #333333;
      padding: 6px 4px;
      /* background set by zebra rules below */
    }

    .step-action { padding: 5px 8px; vertical-align: top; }

    .step-action__text {
      font-size: 8.5pt;
      line-height: 1.5;
    }

    /* Combined Tools & Materials column */
    td.col-tools-mats {
      vertical-align: top;
      padding: 0 !important;
      /* background set by zebra rules below */
    }

    /* Sub-section inside the combined cell */
    .tm-section {
      padding: 4px 6px;
    }

    /* Dividing line between Tools sub-section and Materials sub-section */
    .tm-section + .tm-section {
      border-top: 1px solid #d0d0d0;
    }

    /* Sub-section label: "TOOLS" / "MATERIALS" */
    .tm-label {
      font-size: 6pt;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-faint);
      margin-bottom: 3px;
    }

    /* Each tool or material line */
    .tm-item {
      display: block;
      font-size: 7.5pt;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 2px;
    }

    .tm-item:last-child { margin-bottom: 0; }

    /* Notes column: slightly shaded background for visual separation */
    td.col-notes { font-size: 8pt; /* background set by zebra rules below */ }

    /* Step images sub-row — inherits zebra background from its tr */
    .step-images-row td {
      border-top: 1px dashed #cccccc;
      padding: 6px 8px;
    }

    .step-images-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .step-image-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    /* 16:9 at ~140px or 4:3 — max-width caps size sensibly for A4 */
    .step-image-block img {
      max-width: 150px;
      max-height: 100px;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: block;
    }

    .step-image-block figcaption {
      font-size: 6.5pt;
      color: var(--text-faint);
      text-align: center;
    }

    /* ============================================================
       DEFINITIONS TABLE
       ============================================================ */
    .def-table .col-term { width: 120px; }

    .def-table td.col-term {
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
      font-size: 8pt;
      letter-spacing: 0.3px;
      white-space: nowrap;
      vertical-align: top;
      /* background set by zebra rules below */
    }

    /* ============================================================
       REVISION HISTORY TABLE
       ============================================================ */
    .rev-table .col-ver    { width: 32px; text-align: center; }
    .rev-table .col-by     { width: 90px; white-space: nowrap; }
    .rev-table .col-date   { width: 72px; white-space: nowrap; }
    .rev-table .col-status { width: 90px; }
    .rev-table .col-apprby { width: 90px; white-space: nowrap; }
    .rev-table .col-apprdt { width: 72px; white-space: nowrap; }

    .rev-table td.col-ver {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      text-align: center;
      vertical-align: middle;
      /* background set by zebra rules below */
    }

    /* ============================================================
       ZEBRA STRIPES — Tables 5 (Procedure), 6 (Definitions),
                       7 (Revision History)
       Odd rows = white. Even rows = light grey.
       !important overrides any per-cell background on these tables.
       Image sub-rows in the steps table count as their own row
       in the DOM so they naturally alternate with the step above.
       ============================================================ */
    .steps-table tbody tr:nth-child(odd)  td { background: #ffffff !important; }
    .steps-table tbody tr:nth-child(even) td { background: #f0f0f0 !important; }

    .def-table tbody tr:nth-child(odd)  td { background: #ffffff !important; }
    .def-table tbody tr:nth-child(even) td { background: #f0f0f0 !important; }

    .rev-table tbody tr:nth-child(odd)  td { background: #ffffff !important; }
    .rev-table tbody tr:nth-child(even) td { background: #f0f0f0 !important; }

    .rev-v1-note { font-style: italic; color: var(--text-faint); }

    /* ============================================================
       UTILITIES
       ============================================================ */
    .mono   { font-family: 'Courier New', Courier, monospace; letter-spacing: 0.3px; }
    .bold   { font-weight: bold; }
    .center { text-align: center; }
    .muted  { color: var(--text-muted); }
    .faint  { color: var(--text-faint); font-style: italic; }

    .avoid-break  { page-break-inside: avoid; }
    .break-before { page-break-before: always; }

    .no-data {
      text-align: center;
      font-style: italic;
      font-size: 8pt;
      color: var(--text-faint);
      padding: 10px;
      border: 1px solid var(--border-light);
    }

  </style>
</head>
<body>
<div id="sop-root">
  <!-- Content rendered by JavaScript -->
</div>

<script>

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */

function esc(v) {
  if (v == null) return '';
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escCSS(v) {
  return String(v || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, ' ');
}

function fmtDate(s) {
  if (!s) return '—';
  try {
    var d = new Date(s + (s.length === 10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch (_) { return s; }
}

/* Greyscale status — weight/style only, no colour */
function statusClass(s) {
  if (!s) return 'status--draft';
  var l = s.toLowerCase();
  if (l === 'approved')         return 'status--approved';
  if (l.includes('review'))     return 'status--review';
  if (l === 'rejected')         return 'status--rejected';
  return 'status--draft';
}

function statusText(s) {
  return '<span class="' + statusClass(s) + '">' + esc(s || 'Draft') + '</span>';
}

/* Image thumbnail — real URL or placeholder box */
function imgThumb(url) {
  if (url) {
    return '<img class="table-img" src="' + esc(url) + '" alt="">';
  }
  return '<div class="table-img-placeholder">'
    + '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'
    + '<rect x="3" y="3" width="18" height="18" rx="2"/>'
    + '<circle cx="8.5" cy="8.5" r="1.5"/>'
    + '<polyline points="21 15 16 10 5 21"/>'
    + '</svg>'
    + '</div>';
}

   @page margin-box rules with real document values as literals.

  var brand  = (data.settings && data.settings.brand_color) || '#333333';

  var dept   = escCSS(sop.department || '');
  var status = escCSS(sop.approval_status || 'Draft');

  var el = document.getElementById('dynamic-style') || document.createElement('style');
  el.id  = 'dynamic-style';
  el.textContent = [
    ':root {',
    '  --brand: ' + brand + ';',   /* ONLY brand colour usage — company name text */
    '}',

    /* Running header: all greyscale except @page doesn't support colour vars anyway */
    '@page {',
    '  @top-left {',
    '    content: "' + co + '";',
    '    font-family: Arial, Helvetica, sans-serif;',
    '    font-size: 7pt; color: #444444;',
    '    border-bottom: 0.5pt solid #999999;',
    '    vertical-align: bottom; padding-bottom: 4pt;',
    '  }',
    '  @top-center {',
    '    content: "";',
    '    border-bottom: 0.5pt solid #999999;',
    '    vertical-align: bottom;',
    '  }',
    '  @top-right {',
    '    content: "' + sopId + '  ' + ver + '";',
    '    font-family: "Courier New", Courier, monospace;',
    '    font-size: 7pt; color: #444444;',
    '    border-bottom: 0.5pt solid #999999;',
    '    vertical-align: bottom; padding-bottom: 4pt;',
    '  }',
    '  @bottom-left {',
    '    content: "SOP ID: ' + sopId + '";',
    '    font-family: Arial, Helvetica, sans-serif;',
    '    font-size: 6.5pt; color: #888888;',
    '    border-top: 0.5pt solid #bbbbbb;',
    '    vertical-align: top; padding-top: 3pt;',
    '  }',
    '  @bottom-center {',
    '    content: "";',
    '    border-top: 0.5pt solid #bbbbbb;',
    '    vertical-align: top; padding-top: 3pt;',
    '  }',
    '  @bottom-right {',
    '    content: "Page " counter(page) " of " counter(pages);',
    '    font-family: Arial, Helvetica, sans-serif;',
    '    font-size: 7pt; color: #555555;',
    '    border-top: 0.5pt solid #bbbbbb;',

  document.head.appendChild(el);
}

function renderPurposeScope(sop, n) {
  var hasPurpose = sop.purpose && sop.purpose.trim();
  var hasScope   = sop.scope   && sop.scope.trim();
  if (!hasPurpose && !hasScope) return '';

  var rows = '';
  if (hasPurpose) rows += '<tr class="avoid-break">'
    + '<td class="ps-table__label">Purpose</td>'
    + '<td class="ps-table__content">' + esc(sop.purpose) + '</td>'

/* ============================================================
   RENDERER — PROCEDURE STEPS
   Each step = main row + optional image sub-row.
   Images for each step shown as thumbnails below the step row,
   spanning the action + expected output + notes columns.
   ============================================================ */
function renderSteps(steps, n) {
  var rows = '';

  if (!steps || steps.length === 0) {
    rows = '<tr><td colspan="5" class="no-data">No procedure steps have been defined.</td></tr>';
  } else {
    steps.forEach(function (step) {

      /*
        Build the combined Tools & Materials cell.
        Structure:
          [TOOLS sub-section]   ← omitted if no tools
          ─────────────────     ← divider (CSS border)
          [MATERIALS sub-section] ← omitted if no items
        If both are empty, show a plain dash.
      */
      var hasTools = step.tools && step.tools.length > 0;
      var hasItems = step.items && step.items.length > 0;

      var tmCell = '';

      if (hasTools) {
        var toolLines = step.tools.map(function (t) {
          /* Format: Name - Model/Part No.  (model omitted if absent) */
          var parts = [esc(t.name)];
          if (t.model_part_no) parts.push(esc(t.model_part_no));
          return '<span class="tm-item">' + parts.join(' — ') + '</span>';
        }).join('');
        tmCell += '<div class="tm-section">'
          + '<div class="tm-label">Tools</div>'
          + toolLines
          + '</div>';
      }

      if (hasItems) {
        var matLines = step.items.map(function (it) {
          /* Format: Name - Part No. - Qty X unit */
          var parts = [esc(it.name)];
          if (it.part_no)   parts.push(esc(it.part_no));
          if (it.quantity != null) {
            var qtyStr = 'Qty ' + it.quantity + (it.unit ? ' ' + esc(it.unit) : '');
            parts.push(qtyStr);
          }
          return '<span class="tm-item">' + parts.join(' — ') + '</span>';
        }).join('');
        tmCell += '<div class="tm-section">'
          + '<div class="tm-label">Materials</div>'
          + matLines
          + '</div>';
      }

      if (!hasTools && !hasItems) {
        tmCell = '<div class="tm-section" style="color:#aaa;font-size:7.5pt;">—</div>';
      }

      rows += '<tr class="avoid-break">'
        + '<td class="col-step">' + step.step_number + '</td>'
        + '<td class="step-action">'
        +   '<div class="step-action__text">' + esc(step.action || '') + '</div>'
        + '</td>'
        + '<td class="col-output">' + esc(step.expected_output || '—') + '</td>'
        + '<td class="col-notes">'  + esc(step.notes || '—') + '</td>'
        + '<td class="col-tools-mats">' + tmCell + '</td>'
        + '</tr>';

      /* Image sub-row — spans all columns except the step number column */
      if (step.images && step.images.length > 0) {
        var imgBlocks = step.images.map(function (img, idx) {
          return '<figure class="step-image-block">'
            + '<img src="' + esc(img.url || img.path || '') + '"'
            + '     alt="Step ' + step.step_number + ' — Figure ' + (idx + 1) + '">'
            + '<figcaption>Step ' + step.step_number + ' / Fig. ' + (idx + 1) + '</figcaption>'
            + '</figure>';
        }).join('');

        rows += '<tr class="step-images-row avoid-break">'
          + '<td class="col-step" style="vertical-align:middle;">'
          +   '<span style="font-size:7pt;color:#999;">&#x21b3;</span>'
          + '</td>'
          + '<td colspan="4">'
          +   '<div class="step-images-wrap">' + imgBlocks + '</div>'
          + '</td>'
          + '</tr>';
      }
    });
  }

  return '<div class="section">'
    + secHeader(n, 'PROCEDURE')
    + '<table class="steps-table">'
    +   '<thead><tr>'
    +     '<th class="col-step center">Step</th>'
    +     '<th>Action / Instruction</th>'
    +     '<th class="col-output">Expected Output / Result</th>'
    +     '<th class="col-notes">Notes / Cautions</th>'
    +     '<th class="col-tools-mats">Tools &amp; Materials</th>'
    +   '</tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';
}

/* ============================================================
   RENDERER — DEFINITIONS & ABBREVIATIONS
   ============================================================ */
function renderDefinitions(defs, n) {
  if (!defs || defs.length === 0) return '';

  var rows = defs.map(function (d) {
    return '<tr class="avoid-break">'
      + '<td class="col-term">' + esc(d.term) + '</td>'
      + '<td>' + esc(d.meaning) + '</td>'
      + '</tr>';
  }).join('');

  return '<div class="section">'
    + secHeader(n, 'DEFINITIONS &amp; ABBREVIATIONS')
    + '<table class="def-table">'
    +   '<thead><tr>'
    +     '<th class="col-term">Term / Abbreviation</th>'
    +     '<th>Definition / Meaning</th>'
    +   '</tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';
}

/* ============================================================
   RENDERER — DOCUMENT REVISION HISTORY
   Newest first, V1 ("Initial Draft") at the bottom.
   ============================================================ */
function renderRevisions(revisions, n) {
  if (!revisions || revisions.length === 0) return '';

  var rows = revisions.map(function (r) {
    var notes = r.version === 1
      ? '<span class="rev-v1-note">' + esc(r.revision_notes) + '</span>'
      : esc(r.revision_notes);
    return '<tr class="avoid-break">'
      + '<td class="col-ver">V' + r.version + '</td>'
      + '<td>' + notes + '</td>'
      + '<td class="col-by">' + esc(r.revised_by || '—') + '</td>'
      + '<td class="col-date">' + fmtDate(r.revision_date) + '</td>'
      + '<td class="col-status">' + statusText(r.approval_status) + '</td>'
      + '<td class="col-apprby">' + esc(r.approved_by || '—') + '</td>'
      + '<td class="col-apprdt">' + fmtDate(r.approval_date) + '</td>'
      + '</tr>';
  }).join('');

  return '<div class="section">'
    + secHeader(n, 'DOCUMENT REVISION HISTORY')
    + '<table class="rev-table">'
    +   '<thead><tr>'
    +     '<th class="col-ver center">Ver.</th>'
    +     '<th>Revision Notes</th>'
    +     '<th class="col-by">Revised By</th>'
    +     '<th class="col-date">Rev. Date</th>'
    +     '<th class="col-status">Status</th>'
    +     '<th class="col-apprby">Approved By</th>'
    +     '<th class="col-apprdt">Approval Date</th>'
    +   '</tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '</div>';
}

/* ============================================================
   MAIN — build all sections sequentially, skip empty ones
   ============================================================ */
(function init() {
  var data = window.SOP_DATA;
  var sop  = data.sop;

  applyBrandAndPageStyle(data);

  var n   = 1;
  var out = '';

  out += renderTitleBlock(data);

  var h;
  h = renderPurposeScope(sop, n);   if (h) { out += h; n++; }
  h = renderSafety(sop, n);         if (h) { out += h; n++; }
  h = renderTools(data.tools, n);   if (h) { out += h; n++; }
  h = renderItems(data.items, n);   if (h) { out += h; n++; }

  out += renderSteps(data.steps, n); n++;  /* always shown */

  h = renderDefinitions(data.definitions, n); if (h) { out += h; n++; }
  h = renderRevisions(data.revisions, n);     if (h) { out += h; n++; }

  document.getElementById('sop-root').innerHTML = out;
}());
</script>
</body>
</html>
